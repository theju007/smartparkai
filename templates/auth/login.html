{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<h2 class="text-center mb-4">

Welcome Back

</h2>

<form method="POST">

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="d-grid">

<button
class="btn btn-primary btn-lg">

Login

</button>

</div>

</form>

</div>

</div>

</div>

</div>

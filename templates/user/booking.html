{% extends "base.html" %}

{% block title %}Book Parking Slot{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-primary text-white text-center py-3">

                    <h2 class="mb-0">
                        🚗 Book Parking Slot
                    </h2>

                </div>

                <div class="card-body p-4">

                    <h4 class="text-center mb-4">

                        Selected Slot :
                        <span class="text-primary">
                            {{ slot.slot_number }}
                        </span>

                    </h4>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Select Vehicle
                            </label>

                            <select
                                class="form-select"
                                name="vehicle_id"
                                required>

                                {% for vehicle in vehicles %}

                                <option value="{{ vehicle.id }}">
                                    {{ vehicle.vehicle_number }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Entry Date
                            </label>

                            <input
                                type="date"
                                class="form-control"
                                name="entry_date"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Entry Time
                            </label>

                            <input
                                type="time"
                                class="form-control"
                                name="entry_time"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Exit Time
                            </label>

                            <input
                                type="time"
                                class="form-control"
                                name="exit_time"
                                required>

                        </div>

                        <div class="alert alert-info text-center">

                            <h5 class="mb-0">

                                Parking Fee :
                                <strong>₹100 (Temporary)</strong>

                            </h5>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg w-100">

                            Confirm Booking

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
